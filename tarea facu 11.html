<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Registro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(140px);
    animation:mover 6s infinite alternate;
}

@keyframes mover{
    from{
        transform:translate(-150px,-80px);
    }

    to{
        transform:translate(150px,80px);
    }
}

.form-container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    color:#60a5fa;
    margin-bottom:30px;
    font-size:40px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-size:18px;
}

input, textarea, select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    background:#1e293b;
    color:white;
    font-size:16px;
    transition:0.3s;
}

input:focus,
textarea:focus,
select:focus{
    transform:scale(1.02);
    box-shadow:0 0 15px rgba(37,99,235,0.5);
}

textarea{
    resize:none;
    height:120px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    color:#2563eb;
    transform:scale(1.03);
}

</style>
</head>

<body>}
<div class="form-container">

    <h1> Registro de Usuario</h1>

    <form>

        <label>Nombre y Apellido</label>
        <input type="text" placeholder="Ingresa tu nombre completo" required>

        <label>Correo Electrónico</label>
        <input type="email" placeholder="ejemplo@gmail.com" required>

        <label>Contraseña</label>
        <input type="password" placeholder="Ingresa tu contraseña" required>

        <label>Sexo</label>

        <div class="radio-group">

            <label>
                <input type="radio" name="sexo">
                Masculino
            </label>

            <label>
                <input type="radio" name="sexo">
                Femenino
            </label>

            <label>
                <input type="radio" name="sexo">
                Otro
            </label>

        </div>

        <label>Comentarios</label>
        <textarea placeholder="Escribe aquí tus comentarios..."></textarea>

        <button type="submit">
            Enviar Registro 
        </button>

    </form>

</div>

</body>
</html>
