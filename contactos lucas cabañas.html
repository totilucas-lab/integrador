<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<!-- ICONOS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* MENU */

nav{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
background:#020617;
position:sticky;
top:0;
}

nav a{
color:white;
text-decoration:none;
padding:10px 20px;
border-radius:12px;
transition:0.3s;
}

nav a:hover{
background:#2563eb;
}

/* CONTENIDO */

header{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:60px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:40px;
color:#cbd5e1;
}

/* REDES */

.redes{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.redes a{
width:90px;
height:90px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
font-size:40px;
color:white;
text-decoration:none;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* COLORES */

.whatsapp{
background:#25D366;
}

.instagram{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}

.tiktok{
background:#000;
}

.facebook{
background:#1877F2;
}

/* EFECTO */

.redes a:hover{
transform:scale(1.15);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>
</head>

<body>


<header>

<h1>Mis Contactos</h1>

<p>
Sígueme en mis redes sociales y ponte en contacto conmigo.
</p>

<div class="redes">

<a href="https://wa.me/0986533105" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://www.instagram.com/teolucas16?igsh=dTBjdmFhdHJtMnhq" target="_blank" class="instagram">
<i class="fab fa-instagram"></i>
</a>

<a href="https://www.tiktok.com/@teolucas16?_r=1&_t=ZS-96fM7oS353U" target="_blank" class="tiktok">
<i class="fab fa-tiktok"></i>
</a>

<a href="https://www.facebook.com/share/1EiiJNayke/" target="_blank" class="facebook">
<i class="fab fa-facebook-f"></i>
</a>

</div>

</header>

<footer>
Contacto Personal - Lucas Cabañas
</footer>

</body>
</html>
